<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mouad Oulmadani</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --gold: #FFD700;
      --gold-dim: #B8960C;
      --bg: #030303;
      --surface: rgba(255,255,255,0.03);
      --border: rgba(255, 215, 0, 0.15);
      --text: #e8e8e8;
      --muted: #777;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    /* CSS grid background بدل canvas - أخف بكثير */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
      will-change: transform;
      animation: gridPan 25s linear infinite;
    }
    @keyframes gridPan {
      0% { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 20% 80%, rgba(255,215,0,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 400px 600px at 80% 20%, rgba(255,180,0,0.03) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    /* PARTICLES CANVAS - فقط على الكمبيوتر */
    #particles-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* LOADING SCREEN */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loader-ring {
      position: relative;
      width: 120px;
      height: 120px;
    }
    .loader-ring svg {
      position: absolute;
      inset: 0;
      animation: rotateSVG 1.8s linear infinite;
      will-change: transform;
    }
    @keyframes rotateSVG {
      to { transform: rotate(360deg); }
    }
    #loading-logo {
      position: absolute;
      inset: 12px;
      width: calc(100% - 24px);
      height: calc(100% - 24px);
      border-radius: 50%;
      object-fit: cover;
      background: #111;
    }
    .loading-name {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      color: var(--gold);
      margin-top: 24px;
      letter-spacing: 4px;
      opacity: 0;
      animation: fadeUp 0.5s 0.4s forwards;
    }
    .loading-bar-wrap {
      width: 160px;
      height: 2px;
      background: rgba(255,215,0,0.1);
      border-radius: 99px;
      margin-top: 16px;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.5s 0.7s forwards;
    }
    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      border-radius: 99px;
      animation: loadFill 2s ease-in-out forwards;
    }
    @keyframes loadFill {
      from { width: 0%; }
      to { width: 100%; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* MAIN CONTENT */
    #main-content {
      display: none;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }
    #main-content.visible {
      display: block;
    }

    .card {
      background: rgba(10, 10, 10, 0.9);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px 32px;
      position: relative;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,215,0,0.07);
    }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 36px;
      height: 36px;
    }
    .card::before {
      top: -1px; left: -1px;
      border-top: 2px solid var(--gold);
      border-left: 2px solid var(--gold);
      border-radius: 24px 0 0 0;
    }
    .card::after {
      bottom: -1px; right: -1px;
      border-bottom: 2px solid var(--gold);
      border-right: 2px solid var(--gold);
      border-radius: 0 0 24px 0;
    }

    #lang-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      background: transparent;
      border: 1px solid rgba(255,215,0,0.3);
      color: var(--gold);
      padding: 5px 14px;
      border-radius: 99px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #lang-toggle:hover, #lang-toggle:active {
      background: rgba(255,215,0,0.08);
      border-color: var(--gold);
    }

    /* AVATAR - بدون 3D على الموبايل */
    .avatar-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
    }

    .avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(var(--gold), var(--gold-dim), transparent, var(--gold));
      animation: spinGrad 5s linear infinite;
      will-change: transform;
      z-index: 0;
    }
    .avatar-bg {
      position: absolute;
      inset: -1px;
      border-radius: 50%;
      background: var(--bg);
      z-index: 1;
    }
    .avatar-wrap img {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: #111;
    }
    @keyframes spinGrad {
      to { transform: rotate(360deg); }
    }

    .profile-name {
      font-family: 'Cinzel', serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--gold);
      text-align: center;
      letter-spacing: 2px;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid var(--gold);
      max-width: 0;
      margin: 0 auto 8px;
      text-shadow: 0 0 20px rgba(255,215,0,0.25);
      display: inline-block;
      width: 100%;
    }
    .profile-name.typed {
      animation: typeAnim 1.5s steps(20) forwards;
    }
    @keyframes typeAnim {
      from { max-width: 0; }
      to { max-width: 100%; border-color: transparent; }
    }
    .name-wrap { text-align: center; width: 100%; }

    .profile-sub {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 28px;
      font-weight: 400;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.2), transparent);
    }
    .divider span {
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .social-links {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }
    .social-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 12px 4px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.05);
      color: var(--muted);
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 0.3px;
      font-weight: 500;
      cursor: pointer;
      opacity: 0;
      transform: translateY(12px);
      font-family: 'Rajdhani', sans-serif;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s, border-color 0.2s, transform 0.15s;
    }
    .social-btn:active {
      transform: scale(0.95);
      color: var(--gold);
      border-color: rgba(255,215,0,0.3);
    }
    .social-btn i { font-size: 20px; }
    .social-btn.active {
      animation: fadeSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes fadeSlideIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .info-section {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      position: relative;
      overflow: hidden;
    }
    .info-section::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }
    .info-title {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 14px;
    }
    .info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .info-row:last-child { border-bottom: none; padding-bottom: 0; }
    .info-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: rgba(255,215,0,0.06);
      border: 1px solid rgba(255,215,0,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
      font-size: 12px;
      flex-shrink: 0;
    }
    .info-content { flex: 1; min-width: 0; }
    .info-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .info-value {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
      word-break: break-all;
    }
    .info-value a {
      color: var(--gold);
      text-decoration: none;
    }
    .copy-btn {
      background: rgba(255,215,0,0.07);
      border: 1px solid rgba(255,215,0,0.2);
      color: var(--gold);
      padding: 5px 10px;
      border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s;
    }
    .copy-btn:active { background: rgba(255,215,0,0.15); }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(5,5,5,0.95);
      color: var(--gold);
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      border: 1px solid rgba(255,215,0,0.2);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 380px) {
      .card { padding: 32px 16px 24px; }
      .profile-name { font-size: 20px; }
      .social-links { gap: 6px; }
      .social-btn { padding: 10px 2px; font-size: 9px; }
      .social-btn i { font-size: 18px; }
    }
  </style>
</head>
<body>

  <canvas id="particles-canvas"></canvas>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <div class="loader-ring">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="60" r="54" stroke="rgba(255,215,0,0.08)" stroke-width="2"/>
        <path d="M60 6 A54 54 0 0 1 114 60" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round"/>
        <defs>
          <linearGradient id="grad" x1="60" y1="6" x2="114" y2="60" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FFD700"/>
            <stop offset="100%" stop-color="transparent"/>
          </linearGradient>
        </defs>
      </svg>
      <img src="M.png" id="loading-logo" alt="Logo" onerror="this.style.display='none'"/>
    </div>
    <div class="loading-name">MOUAD</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main-content">
    <div class="card">

      <button id="lang-toggle">AR</button>

      <div class="avatar-wrap" id="avatar-wrap">
        <div class="avatar-ring"></div>
        <div class="avatar-bg"></div>
        <img src="M.png" alt="Mouad Oulmadani" onerror="this.style.display='none'"/>
      </div>

      <div class="name-wrap">
        <div class="profile-name" id="title">Mouad Oulmadani</div>
      </div>
      <div class="profile-sub" id="subtitle">Welcome to my official page</div>

      <div class="divider"><span>Connect</span></div>

      <div class="social-links">
        <a href="https://www.instagram.com/mouad_oul007" target="_blank" class="social-btn">
          <i class="fab fa-instagram"></i>
          <span>Insta</span>
        </a>
        <a href="#" id="copy-discord" class="social-btn">
          <i class="fab fa-discord"></i>
          <span>Discord</span>
        </a>
        <a href="https://t.me/mouad_oulmadani" target="_blank" class="social-btn">
          <i class="fab fa-telegram"></i>
          <span>Telegram</span>
        </a>
        <a href="https://www.roblox.com/users/2895099191/profile" target="_blank" class="social-btn">
          <i class="fas fa-cube"></i>
          <span>Roblox</span>
        </a>
        <a href="https://paypal.me/mouaa123" target="_blank" class="social-btn">
          <i class="fab fa-paypal"></i>
          <span>PayPal</span>
        </a>
      </div>

      <div class="info-section">
        <div class="info-title" id="info-title">📌 SMART INFO</div>

        <div class="info-row">
          <div class="info-icon"><i class="fab fa-instagram"></i></div>
          <div class="info-content">
            <div class="info-label" id="instagram-label">Instagram</div>
            <div class="info-value">
              <span id="instagram-desc">Follow me: </span>
              <a href="https://www.instagram.com/mouad_oul007" target="_blank">@mouad_oul007</a>
            </div>
          </div>
          <button class="copy-btn" id="copy-insta-btn">Copy</button>
        </div>

        <div class="info-row">
          <div class="info-icon"><i class="fab fa-paypal"></i></div>
          <div class="info-content">
            <div class="info-label" id="paypal-label">PayPal</div>
            <div class="info-value">
              <span id="paypal-desc">Support me: </span>
              <a href="https://paypal.me/mouaa123" target="_blank">paypal.me/mouaa123</a>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="toast"></div>

  <script>
    // كشف الموبايل
    var isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent) || window.innerWidth < 768;

    /* PARTICLES - فقط على الكمبيوتر */
    (function() {
      var canvas = document.getElementById('particles-canvas');
      if (isMobile) { canvas.style.display = 'none'; return; }

      var ctx = canvas.getContext('2d');
      var particles = [];
      var W, H;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      function rand(min, max) { return Math.random() * (max - min) + min; }

      function createParticle() {
        return {
          x: rand(0, W), y: rand(0, H),
          r: rand(0.6, 2),
          vx: rand(-0.15, 0.15), vy: rand(-0.3, -0.07),
          twinkle: rand(0, Math.PI * 2),
          fadeSpeed: rand(0.004, 0.008)
        };
      }

      for (var i = 0; i < 80; i++) particles.push(createParticle());

      var lastTime = 0;
      function animate(timestamp) {
        // cap to 30fps on desktop to save battery
        if (timestamp - lastTime < 33) { requestAnimationFrame(animate); return; }
        lastTime = timestamp;

        ctx.clearRect(0, 0, W, H);
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          p.twinkle += p.fadeSpeed * 2;
          var alpha = Math.max(0.05, Math.min(1, 0.4 + Math.sin(p.twinkle) * 0.5));
          p.x += p.vx; p.y += p.vy;
          if (p.y < -10 || p.x < -10 || p.x > W + 10) {
            particles[i] = createParticle();
            particles[i].y = H + 5;
            continue;
          }
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = '#FFD700';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);
    })();

    /* INIT */
    var loadTime = isMobile ? 2200 : 3000;

    function initApp() {
      setTimeout(function() {
        var ls = document.getElementById('loading-screen');
        ls.classList.add('hidden');
        setTimeout(function() {
          ls.style.display = 'none';
          var mc = document.getElementById('main-content');
          mc.classList.add('visible');
          triggerTyping('Mouad Oulmadani');
          var btns = document.querySelectorAll('.social-btn');
          btns.forEach(function(btn, i) {
            setTimeout(function() { btn.classList.add('active'); }, 200 + i * 80);
          });
        }, 600);
      }, loadTime);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }

    /* TYPING */
    function triggerTyping(name) {
      var el = document.getElementById('title');
      el.classList.remove('typed');
      el.textContent = name;
      void el.offsetWidth;
      el.classList.add('typed');
    }

    /* LANGUAGE */
    var isEnglish = true;
    document.getElementById('lang-toggle').addEventListener('click', function() {
      isEnglish = !isEnglish;
      var html = document.documentElement;
      if (!isEnglish) {
        html.lang = 'ar'; html.dir = 'rtl';
        this.textContent = 'EN';
        triggerTyping('معاد أولمدني');
        document.getElementById('subtitle').textContent = 'مرحباً بكم في صفحتي الرسمية';
        document.getElementById('info-title').textContent = '📌 معلومات ذكية';
        document.getElementById('instagram-label').textContent = 'إنستغرام';
        document.getElementById('instagram-desc').textContent = 'تابعني: ';
        document.getElementById('paypal-label').textContent = 'باي بال';
        document.getElementById('paypal-desc').textContent = 'ادعمني: ';
      } else {
        html.lang = 'en'; html.dir = 'ltr';
        this.textContent = 'AR';
        triggerTyping('Mouad Oulmadani');
        document.getElementById('subtitle').textContent = 'Welcome to my official page';
        document.getElementById('info-title').textContent = '📌 SMART INFO';
        document.getElementById('instagram-label').textContent = 'Instagram';
        document.getElementById('instagram-desc').textContent = 'Follow me: ';
        document.getElementById('paypal-label').textContent = 'PayPal';
        document.getElementById('paypal-desc').textContent = 'Support me: ';
      }
    });

    /* COPY */
    function copyText(text, label) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(function() { showToast('✓ ' + label); }).catch(function() { fallbackCopy(text, label); });
      } else {
        fallbackCopy(text, label);
      }
    }
    function fallbackCopy(text, label) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      try { document.execCommand('copy'); showToast('✓ ' + label); } catch(e) { showToast('Could not copy'); }
      document.body.removeChild(ta);
    }

    document.getElementById('copy-discord').addEventListener('click', function(e) {
      e.preventDefault();
      copyText('mouad_oul2008', 'mouad_oul2008');
    });
    document.getElementById('copy-insta-btn').addEventListener('click', function() {
      copyText('@mouad_oul007', '@mouad_oul007');
    });

    /* TOAST */
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2000);
    }

    /* AVATAR TILT - فقط على الكمبيوتر */
    if (!isMobile) {
      (function() {
        var wrap = document.getElementById('avatar-wrap');
        var ring = wrap.querySelector('.avatar-ring');
        if (!wrap) return;

        wrap.style.perspective = '600px';
        wrap.style.cursor = 'pointer';

        var autoAngle = 0, isHovered = false;
        var currentX = 0, currentY = 0, targetX = 0, targetY = 0;
        var raf;

        function lerp(a, b, t) { return a + (b - a) * t; }

        function autoRotate() {
          if (!isHovered) {
            autoAngle += 0.35;
            var rx = Math.sin(autoAngle * Math.PI / 180) * 5;
            var ry = Math.cos(autoAngle * Math.PI / 180 * 0.7) * 7;
            currentX = lerp(currentX, rx, 0.04);
            currentY = lerp(currentY, ry, 0.04);
            wrap.querySelector('img').style.transform = 'rotateX(' + currentX + 'deg) rotateY(' + currentY + 'deg)';
          }
          raf = requestAnimationFrame(autoRotate);
        }
        autoRotate();

        wrap.addEventListener('mousemove', function(e) {
          var rect = wrap.getBoundingClientRect();
          var dx = (e.clientX - rect.left - rect.width/2) / (rect.width/2);
          var dy = (e.clientY - rect.top - rect.height/2) / (rect.height/2);
          targetX = -dy * 18; targetY = dx * 18;
        });
        wrap.addEventListener('mouseenter', function() {
          isHovered = true; cancelAnimationFrame(raf);
          function tiltLoop() {
            if (!isHovered) return;
            currentX = lerp(currentX, targetX, 0.1);
            currentY = lerp(currentY, targetY, 0.1);
            wrap.querySelector('img').style.transform = 'rotateX(' + currentX + 'deg) rotateY(' + currentY + 'deg) scale(1.05)';
            raf = requestAnimationFrame(tiltLoop);
          }
          tiltLoop();
        });
        wrap.addEventListener('mouseleave', function() {
          isHovered = false; targetX = 0; targetY = 0;
          cancelAnimationFrame(raf); autoRotate();
        });
      })();
    }
  </script>
</body>
</html>
